name: Refresh visual-regression snapshots

# Manual-dispatch only. Runs Playwright with --update-snapshots so the
# committed -linux baseline pngs match the current UI. After the run, the
# updated pngs are uploaded as an artifact; download them, commit, and
# remove the `test.fixme` markers from e2e/visual-regression.spec.ts.
#
# We don't run this on every push because it would mask real visual bugs.

on:
  workflow_dispatch:

concurrency:
  group: refresh-snapshots
  cancel-in-progress: false

jobs:
  refresh:
    name: Update snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://qualcanvas:qualcanvas@localhost:55432/qualcanvas_e2e?schema=public
      JWT_SECRET: test-secret-for-ci-pipeline-only
      E2E_TEST: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qualcanvas
          POSTGRES_PASSWORD: qualcanvas
          POSTGRES_DB: qualcanvas_e2e
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U qualcanvas -d qualcanvas_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx prisma generate --schema=apps/backend/prisma/schema.prisma
      - run: npx prisma db push --schema=apps/backend/prisma/schema.prisma --skip-generate
      - run: npm run db:seed -w apps/backend
      # Temporarily unmark fixme'd tests so they run with --update-snapshots.
      # We rewrite test.fixme(... → test( in-place; the workflow only runs
      # the visual-regression spec to keep the run fast.
      - name: Un-fixme visual-regression tests
        run: |
          sed -i 's/test\.fixme(/test(/g' e2e/visual-regression.spec.ts
      - name: Run visual-regression with --update-snapshots
        run: |
          npx playwright test e2e/visual-regression.spec.ts \
            --project=setup --project=chromium \
            --update-snapshots
      - name: Upload updated snapshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: updated-snapshots
          path: e2e/**/*-linux.png
          if-no-files-found: warn
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
