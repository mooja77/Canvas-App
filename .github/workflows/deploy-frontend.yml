name: Deploy frontend to Cloudflare Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=apps/backend/prisma/schema.prisma
      - run: npm run build --workspace=apps/frontend
        env:
          # Pin VITE_API_URL explicitly so analytics.ts + services/api.ts never
          # fall back to the relative `/api` default (which on Cloudflare Pages
          # static host returns 405 — see live QA report finding #7). This env var
          # overrides apps/frontend/.env.production, so it MUST be kept in sync
          # with it. It MUST be api.qualcanvas.com (a subdomain of the frontend's
          # own site) and NOT the raw *.up.railway.app host: same registrable
          # domain ⇒ the httpOnly auth cookie is FIRST-PARTY. Pointing at
          # *.up.railway.app makes it a third-party cookie, which Safari (and
          # Firefox/Brave/Chrome-incognito) block by default, locking those users
          # out of login entirely.
          VITE_API_URL: https://api.qualcanvas.com/api
          VITE_STRIPE_STUDENT_MONTHLY_PRICE_ID: ${{ secrets.VITE_STRIPE_STUDENT_MONTHLY_PRICE_ID }}
          VITE_STRIPE_STUDENT_ANNUAL_PRICE_ID: ${{ secrets.VITE_STRIPE_STUDENT_ANNUAL_PRICE_ID }}
          VITE_STRIPE_PRO_MONTHLY_PRICE_ID: ${{ secrets.VITE_STRIPE_PRO_MONTHLY_PRICE_ID }}
          VITE_STRIPE_PRO_ANNUAL_PRICE_ID: ${{ secrets.VITE_STRIPE_PRO_ANNUAL_PRICE_ID }}
          VITE_STRIPE_TEAM_MONTHLY_PRICE_ID: ${{ secrets.VITE_STRIPE_TEAM_MONTHLY_PRICE_ID }}
          VITE_STRIPE_TEAM_ANNUAL_PRICE_ID: ${{ secrets.VITE_STRIPE_TEAM_ANNUAL_PRICE_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          # Frontend error monitoring. The DSN is public-by-design (it ships in
          # the client bundle); main.tsx only inits Sentry when this is present,
          # so without it frontend errors were never captured. VITE_GIT_SHA tags
          # every event with the deployed commit for release tracking.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_GIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Publish to Cloudflare Pages
        run: |
          # wrangler auto-detects the git commit message and sends it to the
          # Cloudflare Pages API, which rejects anything that isn't clean UTF-8.
          # It can truncate a multibyte char (—, →, emoji) mid-sequence, yielding
          # invalid bytes → "Invalid commit message" [code 8000111] and a failed
          # deploy (hit on commit 14c3b6b). Pass an explicit ASCII-sanitised
          # subject + hash so the message can never break the publish again.
          MSG=$(git log -1 --pretty=%s | LC_ALL=C tr -cd '\40-\176' | cut -c1-100)
          npx wrangler@4 pages deploy apps/frontend/dist \
            --project-name=qualcanvas --branch=main \
            --commit-hash="$GITHUB_SHA" \
            --commit-message="${MSG:-deploy}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
