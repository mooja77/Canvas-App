name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.env.example'
      - 'docs/**'
      - 'LICENSE'
      - '.vscode/**'
      - 'scripts/**'
      - 'workers/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.env.example'
      - 'docs/**'
      - 'LICENSE'
      - '.vscode/**'
      - 'scripts/**'
      - 'workers/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      JWT_SECRET: test-secret-for-ci-pipeline-only
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      DATABASE_URL: file:./test.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=apps/backend/prisma/schema.prisma
      - run: npm test

  # E2E tests require a running dev server with PostgreSQL.
  # They run locally via `npm run test:e2e` but are skipped in CI
  # because the schema uses provider="postgresql" and CI only has SQLite.
  # To enable: add a PostgreSQL service container and update DATABASE_URL.
