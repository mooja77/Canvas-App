name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.env.example'
      - 'docs/**'
      - 'LICENSE'
      - '.vscode/**'
      - 'scripts/**'
      - 'workers/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.env.example'
      - 'docs/**'
      - 'LICENSE'
      - '.vscode/**'
      - 'scripts/**'
      - 'workers/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=apps/backend/prisma/schema.prisma
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=apps/backend/prisma/schema.prisma
      - run: npm run build
      - run: npm run build:budget

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    env:
      JWT_SECRET: test-secret-for-ci-pipeline-only
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      DATABASE_URL: file:./test.db
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=apps/backend/prisma/schema.prisma
      - run: npm test

  schema-drift:
    # Reliability fix #1 — catch the "model in schema.prisma without a
    # matching migration" class of bug. Soft-fail for now because migrations
    # 0001-0011 were originally authored in SQLite syntax (DATETIME instead
    # of TIMESTAMP, inline PRIMARY KEY, etc.) which is unrunnable on Postgres
    # via `migrate deploy`. Prod was bootstrapped via `prisma db push` and
    # the migration history was never replayed cleanly.
    #
    # Reconciling the migration history with Postgres syntax is its own
    # multi-day project (touches 15 migration files + one prod-side
    # `migrate resolve --applied 0001..0011` rolling fix). Until then, this
    # job runs in `continue-on-error` mode — drift is visible in the run
    # summary but doesn't block PRs. TODO: full reconciliation, then remove
    # `continue-on-error`.
    name: Schema Drift Check
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DATABASE_URL: postgresql://qualcanvas:qualcanvas@localhost:55432/qualcanvas_drift?schema=public
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qualcanvas
          POSTGRES_PASSWORD: qualcanvas
          POSTGRES_DB: qualcanvas_drift
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U qualcanvas -d qualcanvas_drift"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=apps/backend/prisma/schema.prisma
      - name: Apply migration history to clean Postgres
        run: npx prisma migrate deploy --schema=apps/backend/prisma/schema.prisma
      - name: Diff deployed DB vs schema.prisma (fails on drift)
        run: |
          npx prisma migrate diff \
            --from-url "$DATABASE_URL" \
            --to-schema-datamodel apps/backend/prisma/schema.prisma \
            --exit-code

  e2e-chromium:
    name: E2E Chromium
    runs-on: ubuntu-latest
    needs: [build, unit-tests]
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://qualcanvas:qualcanvas@localhost:55432/qualcanvas_e2e?schema=public
      JWT_SECRET: test-secret-for-ci-pipeline-only
      E2E_TEST: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qualcanvas
          POSTGRES_PASSWORD: qualcanvas
          POSTGRES_DB: qualcanvas_e2e
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U qualcanvas -d qualcanvas_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx prisma generate --schema=apps/backend/prisma/schema.prisma
      - run: npx prisma db push --schema=apps/backend/prisma/schema.prisma --skip-generate
      - run: npm run db:seed -w apps/backend
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
